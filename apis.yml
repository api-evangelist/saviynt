apis:
  - aid: saviynt:saviynt-enterprise-identity-cloud-api
    name: Saviynt Enterprise Identity Cloud API
    description: REST API for the Saviynt Enterprise Identity Cloud (EIC) platform, providing endpoints for identity administration, access requests, SOD policy management, identity analytics, rule engineering, delegated administration, and common IGA utilities. Authentication uses OAuth 2.0 bearer tokens (JWT) obtained via the login endpoint.
